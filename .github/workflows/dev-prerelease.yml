name: Publish Dev Pre-release

# On every push to dev, builds a fresh zip and recreates the fixed `dev`
# pre-release.  The existing `dev` release and tag are deleted first so the
# download URL stays stable.  The update-manifest job is then called directly
# to rebuild the manifest branch.

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dev-prerelease
  cancel-in-progress: true

jobs:
  dev-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read plugin config
        id: config
        run: |
          SLUG=$(python3 -c "import json; n=json.load(open('src/plugin.json'))['name']; print(n.lower().replace(' ','_'))")
          DEV_TAG=$(python3 -c "import json; print(json.load(open('.github/workflows/manifest-config.json'))['dev_tag'])")
          AGGREGATOR_REPO=$(python3 -c "import json; print(json.load(open('.github/workflows/manifest-config.json')).get('aggregator_repo',''))")
          BASE_NAME="${SLUG//_/-}"
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "base_name=$BASE_NAME" >> $GITHUB_OUTPUT
          echo "dev_tag=$DEV_TAG" >> $GITHUB_OUTPUT
          echo "aggregator_repo=$AGGREGATOR_REPO" >> $GITHUB_OUTPUT

      - name: Determine dev version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HASH=$(git rev-parse --short=8 HEAD)
          # Base on latest stable release version so Dispatcharr displays e.g. v3.0.0-dev-e82297bd
          LATEST=$(gh release list --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // ""')
          BASE="${LATEST#v}"  # strip leading v if present
          if [ -z "$BASE" ]; then
            BASE="0.0.0"
          fi
          PLUGIN_VERSION="${BASE}-dev-${HASH}"
          TAG="${{ steps.config.outputs.dev_tag }}"
          BASE_NAME="${{ steps.config.outputs.base_name }}"
          ZIP="${BASE_NAME}-${{ steps.config.outputs.dev_tag }}.zip"
          echo "PLUGIN_VERSION=$PLUGIN_VERSION" >> $GITHUB_OUTPUT
          echo "HASH=$HASH" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "ZIP=$ZIP" >> $GITHUB_OUTPUT

      - name: Update version in source files
        run: |
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${{ steps.version.outputs.PLUGIN_VERSION }}\"/" src/plugin.json

      - name: Package plugin
        run: |
          chmod +x package.sh
          ./package.sh

      - name: Rename zip for stable dev link
        run: |
          BASE_NAME="${{ steps.config.outputs.base_name }}"
          ZIP="${{ steps.version.outputs.ZIP }}"
          # package.sh produces {base_name}-{PLUGIN_VERSION}.zip; rename to stable name
          VERSIONED=$(ls "${BASE_NAME}"-*.zip 2>/dev/null | head -1)
          if [ -n "$VERSIONED" ] && [ "$VERSIONED" != "$ZIP" ]; then
            mv "$VERSIONED" "$ZIP"
          fi

      - name: Delete old dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ steps.config.outputs.dev_tag }}" --yes 2>/dev/null || true
          git push origin :refs/tags/${{ steps.config.outputs.dev_tag }} 2>/dev/null || true

      - name: Create dev pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          ZIP="${{ steps.version.outputs.ZIP }}"
          HASH="${{ steps.version.outputs.HASH }}"

          NAME=$(jq -r '.name' src/plugin.json)
          DESCRIPTION=$(jq -r '.description' src/plugin.json)
          AUTHOR=$(jq -r '.author' src/plugin.json)
          LICENSE=$(jq -r '.license' src/plugin.json)
          MIN_VER=$(jq -r '.min_dispatcharr_version' src/plugin.json)
          HELP_URL=$(jq -r '.help_url' src/plugin.json)
          DISCORD=$(jq -r '.discord_thread // empty' src/plugin.json)

          NOTES=$(cat <<NOTES_EOF
          **${NAME}**  dev build from the \`dev\` branch.

          | Field | Value |
          |---|---|
          | **Description** | ${DESCRIPTION} |
          | **Author** | ${AUTHOR} |
          | **License** | ${LICENSE} |
          | **Min Dispatcharr** | ${MIN_VER} |
          | **Docs** | ${HELP_URL} |
          NOTES_EOF
          )

          if [ -n "$DISCORD" ]; then
            NOTES="${NOTES}
          | **Discord** | ${DISCORD} |"
          fi

          gh release create "$TAG" \
            --prerelease \
            --title "Dev Build (${HASH})" \
            --notes "$NOTES" \
            "$ZIP"

      - name: Notify aggregator
        env:
          PAT: ${{ secrets.SETH_PAT }}
          AGGREGATOR_REPO: ${{ steps.config.outputs.aggregator_repo }}
        run: |
          if [ -z "$PAT" ] || [ -z "$AGGREGATOR_REPO" ]; then
            echo "No PAT or aggregator_repo configured – skipping dispatch."
            exit 0
          fi
          curl -s --fail -X POST \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${AGGREGATOR_REPO}/dispatches" \
            -d "{\"event_type\":\"plugin-updated\",\"client_payload\":{\"repo\":\"${{ github.repository }}\"}}"
