name: Update Manifest Branch

# Rebuilds the plugin repo manifests whenever a release is published,
# promoted from pre-release, or deleted, and pushes the result to the
# `manifest` branch so Dispatcharr can consume it as a plugin repo.
#
# Manifest branch layout:
#   manifest.json                                <- root repo manifest
#   plugins/dispatcharr_exporter/manifest.json   <- per-plugin manifest
#   plugins/dispatcharr_exporter/logo.png        <- plugin icon

on:
  release:
    types: [published, released, deleted]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-manifest
  cancel-in-progress: true

jobs:
  update-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build manifests from releases
        id: build
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/build_manifest.py

      - name: Copy logo
        if: steps.build.outputs.has_releases == 'true'
        run: |
          mkdir -p _manifest_out/plugins/${{ steps.build.outputs.slug }}
          cp ${{ steps.build.outputs.logo }} _manifest_out/plugins/${{ steps.build.outputs.slug }}/logo.png

      - name: Push to manifest branch
        if: steps.build.outputs.has_releases == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SLUG="${{ steps.build.outputs.slug }}"

          # Use a git worktree so we don't disturb the current checkout.
          # Create the manifest branch as an orphan if it doesn't exist yet.
          if git ls-remote --exit-code origin manifest &>/dev/null; then
            git fetch origin manifest
            git worktree add _manifest_wt origin/manifest
          else
            git worktree add --orphan -b manifest _manifest_wt
          fi

          # Sync generated files into the worktree
          cp _manifest_out/manifest.json                        _manifest_wt/manifest.json
          mkdir -p _manifest_wt/plugins/$SLUG
          cp _manifest_out/plugins/$SLUG/manifest.json          _manifest_wt/plugins/$SLUG/manifest.json
          cp _manifest_out/plugins/$SLUG/logo.png               _manifest_wt/plugins/$SLUG/logo.png

          cd _manifest_wt
          git add -A
          if git diff --cached --quiet; then
            echo "Manifests unchanged – nothing to commit."
          else
            git commit -m "chore: update manifests [skip ci]"
            git push origin HEAD:manifest
          fi
